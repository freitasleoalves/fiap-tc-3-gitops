apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/freitasleoalves/fiap-tc-3-gitops.git
        revision: HEAD
        files:
          - path: addons/*/config.json
  template:
    metadata:
      name: 'addon-{{ .path.basename }}'
    spec:
      project: default
      sources:
        - repoURL: '{{ .repoURL }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .targetRevision }}'
          helm:
            releaseName: '{{ .path.basename }}'
            valueFiles:
              - $values/{{ .path.path }}/values.yaml
        - repoURL: https://github.com/freitasleoalves/fiap-tc-3-gitops.git
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
