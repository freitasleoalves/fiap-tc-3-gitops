apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  labels:
    app: analytics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: acrtogglemasterprod.azurecr.io/analytics-service:latest
          ports:
            - containerPort: 8005
          env:
            - name: PORT
              value: "8005"
            - name: CLOUD_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: cloud-provider
            - name: AZURE_SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: servicebus-connection-string
            - name: AZURE_SERVICEBUS_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: servicebus-queue-name
            - name: AZURE_COSMOSDB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: cosmosdb-connection-string
            - name: AZURE_COSMOSDB_TABLE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: cosmosdb-table-name
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
