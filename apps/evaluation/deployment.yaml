apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: togglemaster-evaluation
  labels:
    app: evaluation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: acrtogglemasterprod.azurecr.io/evaluation-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: CLOUD_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: cloud-provider
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-url
            - name: FLAG_SERVICE_URL
              value: "http://flag-service.togglemaster-flags.svc.cluster.local:8002"
            - name: TARGETING_SERVICE_URL
              value: "http://targeting-service.togglemaster-targeting.svc.cluster.local:8003"
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: service-api-key
            - name: AZURE_SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: servicebus-connection-string
            - name: AZURE_SERVICEBUS_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: servicebus-queue-name
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: togglemaster-evaluation
spec:
  selector:
    app: evaluation-service
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
